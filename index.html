<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>ITSM DAILY SCRUM WHEEL</title>

    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background: linear-gradient(to right, #e6f0fa, #fcebeb);
            font-size: 1em;
            margin: 0;
            height: 100vh;
            box-sizing: border-box;
        }

        .left-col {
            width: 390px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
            justify-content: flex-start;
        }

        .center-col {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 0 10px;
        }

        .right-col {
            width: 180px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: center;
            justify-content: flex-start;
        }

        h2 {
            font-family: 'Bangers', cursive;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px white, 4px 4px 0px #ccc;
            margin: 0;
            line-height: 1;
        }

        #date-picker {
            padding: 15px;
            font-weight: bold;
            text-align: center;
            font-size: 1.5em;
            border: 2px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 3px 3px 0px #333;
        }

        .arrow {
            cursor: pointer;
            user-select: none;
            font-size: 1.5em;
            padding: 0 10px;
            color: black;
            -webkit-text-stroke: 0px;
        }

        .arrow:hover {
            transform: scale(1.2);
        }

        #current-date-text {
            font-family: 'Arial Black', sans-serif;
            text-transform: uppercase;
            color: black;
            -webkit-text-stroke: 0px;
        }

        .box {
            border: 2px solid black;
            padding: 10px;
            background: white;
            flex-grow: 1;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
            overflow-y: auto;
        }

        .box h3 {
            margin: 0 0 15px 0;
            font-family: 'Bangers', cursive;
            font-size: 2.2em;
            background: #b3e5fc;
            color: black;
            display: block;
            text-align: center;
            padding: 8px 10px;
            border: 2px solid black;
            text-transform: uppercase;
        }

        #history-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        #history-list li {
            margin-bottom: 8px;
            font-size: 1.1em;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 4px;
            font-family: 'Trebuchet MS', sans-serif;
        }

        .history-day {
            font-weight: bold;
            font-family: 'Arial Black', sans-serif;
            text-transform: uppercase;
            color: white;
            -webkit-text-stroke: 1px black;
        }

        #wheel-container {
            position: relative;
            margin-top: 10px;
        }

        canvas {
            border-radius: 50%;
            border: 6px solid #222;
            background: white;
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
        }

        .pointer {
            position: absolute;
            right: -25px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 25px solid transparent;
            border-bottom: 25px solid transparent;
            border-right: 50px solid #2da944;
            filter: drop-shadow(-3px 3px 2px rgba(0,0,0,0.5));
            z-index: 10;
        }

        .center-troll {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95px;
            height: 95px;
            background: white;
            border-radius: 50%;
            border: 5px solid black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Bangers', cursive;
            font-size: 26px;
            cursor: pointer;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
            color: #d82b2b;
            line-height: 1;
        }

        .center-troll-icon {
            font-size: 32px;
            color: #FFD700;
            -webkit-text-stroke: 1.5px black;
            margin-top: 4px;
        }

        .manual-pick-box {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            align-items: center;
            background: white;
            padding: 10px 20px;
            border: 3px solid black;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
            border-radius: 8px;
        }

        #manual-pick-select {
            font-family: 'Poppins', sans-serif;
            font-weight: bold;
            font-size: 1.1em;
            padding: 5px 10px;
            border: 2px solid #333;
            cursor: pointer;
            min-width: 180px;
        }

        .btn-manual {
            font-family: 'Bangers', cursive;
            background: #9c27b0;
            color: white;
            border: 2px solid black;
            padding: 8px 20px;
            font-size: 1.4em;
            cursor: pointer;
            box-shadow: 2px 2px 0px black;
            transition: transform 0.1s;
        }

        .btn-manual:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px black;
        }

        #winner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #winner-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .winner-text-container {
            text-align: center;
            transform: scale(0.1);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #winner-overlay.active .winner-text-container {
            transform: scale(1);
        }

        .winner-label {
            color: white;
            font-family: 'Bangers', cursive;
            font-size: 3em;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px #333;
        }

        #winner-name-display {
            color: #FFD700;
            font-family: 'Arial Black', sans-serif;
            font-size: 6em;
            -webkit-text-stroke: 3px black;
            text-shadow: 6px 6px 0px #e62e2e;
            text-transform: uppercase;
        }

        .btn {
            border-radius: 50%;
            color: white;
            border: 3px solid #222;
            width: 110px;
            height: 110px;
            font-family: 'Bangers', cursive;
            font-size: 1.6em;
            letter-spacing: 1px;
            cursor: pointer;
            margin: 0 auto;
            display: block;
            box-shadow: 3px 5px 0px #222;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0px 2px 0px #222;
        }

        .btn-reset {
            background-color: #e62e2e;
            text-shadow: 1px 1px 0px black;
        }

        .btn-reverse {
            background-color: #ff9800;
            text-shadow: 1px 1px 0px black;
        }

        .btn-namelist {
            background-color: #2da944;
            text-shadow: 1px 1px 0px black;
        }

        .last-winner {
            border: 3px solid black;
            padding: 10px;
            font-family: 'Bangers', cursive;
            font-size: 2em;
            background: white;
            color: #333;
        }

        #name-input-area {
            width: 100%;
            height: 150px;
            font-size: 1em;
            padding: 5px;
            box-sizing: border-box;
            font-family: Arial;
        }

        .save-btn {
            padding: 10px;
            font-size: 1em;
            background: #2196f3;
            color: white;
            border: 2px solid #222;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            font-weight: bold;
            font-family: 'Bangers', cursive;
            font-size: 1.2em;
        }

        #sync-status {
            position: absolute;
            top: 5px;
            right: 10px;
            font-size: 0.8em;
            font-weight: bold;
            color: gray;
        }
    </style>
</head>

<body>
    <div id="sync-status">🔄 Landogy database Connecting...</div>

    <div id="winner-overlay">
        <div class="winner-text-container">
            <div class="winner-label">AND THE PRESENTER IS...</div>
            <div id="winner-name-display">NAME</div>
        </div>
    </div>

    <div class="left-col">
        <h2 style="font-size: 2.2em; text-align: left; text-transform: uppercase;">YOU ARE SPINNING FOR DAY:</h2>

        <div id="date-picker">
            <span class="arrow" onclick="changeDate(-1)">&#8678;</span>
            <span id="current-date-text">FRIDAY 17.4.</span>
            <span class="arrow" onclick="changeDate(1)">&#8680;</span>
        </div>

        <div class="box">
            <h3>Already presented</h3>
            <ul id="history-list"></ul>
        </div>
    </div>

    <div class="center-col">
        <h2 style="font-size: 3.5em; color: #007BFF;">ITSM DAILY SCRUM WHEEL</h2>

        <div id="wheel-container">
            <canvas id="wheel" width="550" height="550"></canvas>

            <div class="center-troll" onclick="spinWheel()" title="Click to spin!">
                SPIN
                <i class="fas fa-bolt center-troll-icon"></i>
            </div>

            <div class="pointer"></div>
        </div>

        <div class="manual-pick-box">
            <select id="manual-pick-select">
                <option value="">-- Choose volunteer --</option>
            </select>

            <button class="btn-manual" onclick="pickManually()">PICK MANUALLY</button>
        </div>
    </div>

    <div class="right-col">
        <h2 style="font-size: 2.5em; color: #f3212f;">SPINNER</h2>

        <div class="last-winner" id="last-winner-text">---</div>

        <button class="btn btn-reset" onclick="resetWheel()">RESET</button>
        <button class="btn btn-reverse" onclick="reverseLast()">REVERSE</button>
        <button class="btn btn-namelist" onclick="toggleNameList()">NAME<br>LIST</button>

        <div id="edit-names-container" style="display: none; text-align: left; background: white; border: 2px solid black; padding: 10px; margin-top: 10px;">
            <label style="font-weight: bold; font-size: 0.9em; display:block; margin-bottom: 5px;">Edit names:</label>
            <textarea id="name-input-area"></textarea>
            <button class="save-btn" onclick="saveNames()">SAVE</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBBRSt57EsvIkCQ7ZaU8Gvvc82rl3Z8_c4",
        authDomain: "wheel-23f7a.firebaseapp.com",
        databaseURL: "https://wheel-23f7a-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "wheel-23f7a",
        storageBucket: "wheel-23f7a.firebasestorage.app",
        messagingSenderId: "749954647513",
        appId: "1:749954647513:web:653289f12e8cba6a41c5c8"
    };

    firebase.initializeApp(firebaseConfig);

    const database = firebase.database();
    const dbRef = database.ref("state");

    const RESET_PIN = "1234";

    const DEFAULT_NAMES = [
        "Lukáš",
        "Veronika",
        "Lucia",
        "František",
        "Marina",
        "Dominik",
        "Peter",
        "Hendrik",
        "Ersin",
        "Jakub K",
        "Tereza",
        "Jakub D",
        "Iveta",
        "Marek",
        "Martin",
        "Ondřej",
        "Adam"
    ];

    const dayColors = {
        1: "#ffe600",
        2: "#4caf50",
        3: "#2196f3",
        4: "#9c27b0",
        5: "#ffc0cb"
    };

    const dayNames = [
        "SUNDAY",
        "MONDAY",
        "TUESDAY",
        "WEDNESDAY",
        "THURSDAY",
        "FRIDAY",
        "SATURDAY"
    ];

    let names = [...DEFAULT_NAMES];
    let historyObj = [];
    let colors = ["#1fd9ed", "#b3122a", "#12b3ae", "#1212b3", "#f679fc", "#0b3c70"];

    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");

    let currentAngle = 0;
    let isSpinning = false;

    const centerX = 275;
    const centerY = 275;
    const radius = 265;

    dbRef.on(
        "value",
        (snapshot) => {
            const data = snapshot.val();

            if (data && Array.isArray(data.names) && Array.isArray(data.historyObj)) {
                names = data.names;
                historyObj = data.historyObj;
            } else {
                console.warn("Firebase state is empty or invalid. Keeping local state and not resetting.");
            }

            document.getElementById("sync-status").innerText = "✅ Online";

            updateHistoryUI();
            updateManualSelect();
            drawWheel();
        },
        (error) => {
            console.error("Firebase read error:", error);
            document.getElementById("sync-status").innerText = "❌ Firebase error: " + error.code;
        }
    );

    function saveStateToFirebase(action = "unknown") {
        document.getElementById("sync-status").innerText = "🔄 Saving...";

        dbRef.set({
            names: names,
            historyObj: historyObj,
            lastUpdatedAt: new Date().toISOString(),
            lastAction: action
        })
        .then(() => {
            document.getElementById("sync-status").innerText = "✅ Online";
        })
        .catch((error) => {
            console.error("Firebase save error:", error);
            document.getElementById("sync-status").innerText = "❌ Save error: " + error.code;
        });
    }

    function updateManualSelect() {
        let select = document.getElementById("manual-pick-select");

        select.innerHTML = '<option value="">-- Choose volunteer --</option>';

        names.forEach((name, index) => {
            let opt = document.createElement("option");
            opt.value = index;
            opt.innerText = name;
            select.appendChild(opt);
        });
    }

    let currentDate = new Date();
    currentDate.setDate(currentDate.getDate() + 1);

    if (currentDate.getDay() === 0) {
        currentDate.setDate(currentDate.getDate() + 1);
    } else if (currentDate.getDay() === 6) {
        currentDate.setDate(currentDate.getDate() + 2);
    }

    function updateDateUI() {
        let d = currentDate.getDate();
        let m = currentDate.getMonth() + 1;
        let dColor = dayColors[currentDate.getDay()] || "#ffffff";

        let dateContainer = document.getElementById("date-picker");
        let dateTextEl = document.getElementById("current-date-text");

        dateTextEl.innerText = `${dayNames[currentDate.getDay()]} ${d}.${m}.`;

        dateContainer.style.backgroundColor = dColor;
        dateTextEl.style.color = "black";
        dateTextEl.style["-webkit-text-stroke"] = "0px";
    }

    function changeDate(days) {
        currentDate.setDate(currentDate.getDate() + days);

        if (currentDate.getDay() === 0) {
            currentDate.setDate(currentDate.getDate() + (days > 0 ? 1 : -2));
        } else if (currentDate.getDay() === 6) {
            currentDate.setDate(currentDate.getDate() + (days > 0 ? 2 : -1));
        }

        updateDateUI();
    }

    updateDateUI();

    function drawWheel() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (names.length === 0) {
            ctx.fillStyle = "#eee";
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.fill();

            ctx.fillStyle = "black";
            ctx.font = "bold 30px 'Bangers', cursive";
            ctx.textAlign = "center";
            ctx.fillText("VŠICHNI PREZENTOVALI", centerX, centerY - 80);

            return;
        }

        let arc = Math.PI / (names.length / 2);

        for (let i = 0; i < names.length; i++) {
            let angle = currentAngle + i * arc;

            ctx.beginPath();
            ctx.fillStyle = colors[i % colors.length];
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, angle, angle + arc, false);
            ctx.fill();

            ctx.lineWidth = 3;
            ctx.strokeStyle = "#111";
            ctx.stroke();

            ctx.save();
            ctx.translate(
                centerX + Math.cos(angle + arc / 2) * 170,
                centerY + Math.sin(angle + arc / 2) * 170
            );
            ctx.rotate(angle + arc / 2 + Math.PI);

            ctx.font = "bold 20px 'Poppins', sans-serif";
            ctx.lineWidth = 3;
            ctx.strokeStyle = "black";
            ctx.strokeText(names[i], -ctx.measureText(names[i]).width / 2, 0);

            ctx.fillStyle = "white";
            ctx.fillText(names[i], -ctx.measureText(names[i]).width / 2, 0);

            ctx.restore();
        }
    }

    function getCurrentDateString() {
        return `${currentDate.getDate()}.${currentDate.getMonth() + 1}.`;
    }

    function isDateAlreadyPicked() {
        let targetDateStr = getCurrentDateString();
        let alreadySelected = historyObj.some(item => item.date === targetDateStr);

        if (alreadySelected) {
            alert("⚠️ For this date (" + targetDateStr + ") is presenter already picked. Please choose another date.");
            return true;
        }

        return false;
    }

    function executeWinnerRoutine(winningIndex, action = "picked") {
        isSpinning = true;

        let winnerName = names[winningIndex];

        let overlay = document.getElementById("winner-overlay");
        document.getElementById("winner-name-display").innerText = winnerName;

        overlay.classList.add("active");

        setTimeout(() => {
            overlay.classList.remove("active");

            let dateStr = getCurrentDateString();
            let dName = dayNames[currentDate.getDay()];
            let dColor = dayColors[currentDate.getDay()] || "#ffffff";

            historyObj.push({
                name: winnerName,
                date: dateStr,
                dayName: dName,
                dayColor: dColor
            });

            names.splice(winningIndex, 1);

            saveStateToFirebase(action);

            isSpinning = false;
        }, 3000);
    }

    function pickManually() {
        if (isSpinning || names.length === 0) {
            return;
        }

        if (isDateAlreadyPicked()) {
            return;
        }

        let select = document.getElementById("manual-pick-select");
        let selectedIndex = select.value;

        if (selectedIndex === "") {
            alert("Please select a volunteer first!");
            return;
        }

        executeWinnerRoutine(parseInt(selectedIndex), "manual_pick");

        select.value = "";
    }

    function spinWheel() {
        if (isSpinning || names.length === 0) {
            return;
        }

        if (isDateAlreadyPicked()) {
            return;
        }

        isSpinning = true;

        let spinAngle = Math.random() * 10 + 20;
        let duration = 3500;
        let start = null;

        function animate(timestamp) {
            if (!start) {
                start = timestamp;
            }

            let progress = timestamp - start;
            let easeOut = 1 - Math.pow(1 - (progress / duration), 3);

            currentAngle += (spinAngle * (1 - easeOut)) * 0.05;

            drawWheel();

            if (progress < duration) {
                requestAnimationFrame(animate);
            } else {
                let normalizedAngle = currentAngle % (2 * Math.PI);
                let arc = (2 * Math.PI) / names.length;
                let pointerAngle = (2 * Math.PI - normalizedAngle) % (2 * Math.PI);
                let winningIndex = Math.floor(pointerAngle / arc);

                executeWinnerRoutine(winningIndex, "spin_pick");
            }
        }

        requestAnimationFrame(animate);
    }

    function updateHistoryUI() {
        let list = document.getElementById("history-list");

        list.innerHTML = "";

        historyObj.forEach(item => {
            let li = document.createElement("li");

            li.innerHTML = `
                <strong>${item.name}</strong> -
                <span class="history-day" style="color: ${item.dayColor}; text-shadow: 2px 2px 0px ${item.dayColor};">
                    ${item.dayName}
                </span>
                <span style="color:gray; font-size: 0.9em;">${item.date}</span>
            `;

            list.appendChild(li);
        });

        if (historyObj.length > 0) {
            document.getElementById("last-winner-text").innerText = historyObj[historyObj.length - 1].name;
        } else {
            document.getElementById("last-winner-text").innerText = "---";
        }
    }

    function reverseLast() {
        if (isSpinning || historyObj.length === 0) {
            return;
        }

        let lastEntry = historyObj.pop();

        names.push(lastEntry.name);

        saveStateToFirebase("reverse");
    }

    function toggleNameList() {
        let container = document.getElementById("edit-names-container");

        if (container.style.display === "none") {
            container.style.display = "block";
            document.getElementById("name-input-area").value = names.join("\n");
        } else {
            container.style.display = "none";
        }
    }

    function saveNames() {
        let text = document.getElementById("name-input-area").value;

        names = text
            .split("\n")
            .map(n => n.trim())
            .filter(n => n !== "");

        document.getElementById("edit-names-container").style.display = "none";

        saveStateToFirebase("save_names");
    }

    function resetWheel() {
        const pin = prompt("Enter reset PIN:");

        if (pin !== RESET_PIN) {
            alert("Wrong PIN.");
            return;
        }

        if (confirm("Do you really want to restart the picker? Everyone will be taken back to the wheel.")) {
            historyObj = [];
            names = [...DEFAULT_NAMES];

            saveStateToFirebase("reset");
        }
    }

    drawWheel();
</script>
</body>
</html>
