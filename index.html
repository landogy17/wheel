<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>ITSM DAILY SCRUM WHEEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { 
            font-family: Arial, sans-serif; 
            display: flex; 
            justify-content: space-between; 
            padding: 20px; 
            background: linear-gradient(to right, #e6f0fa, #fcebeb); 
            font-size: 1em;
            margin: 0;
            height: 100vh;
            box-sizing: border-box;
        }
        
        /* Rozšířený levý sloupec o cca 1cm (na 390px) */
        .left-col { width: 390px; flex-shrink: 0; display: flex; flex-direction: column; gap: 15px; justify-content: flex-start; } 
        .center-col { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 0 10px; }
        .right-col { width: 180px; flex-shrink: 0; display: flex; flex-direction: column; gap: 15px; text-align: center; justify-content: flex-start; }
        
        h2 { 
            font-family: 'Bangers', cursive; 
            letter-spacing: 2px; 
            text-shadow: 2px 2px 0px white, 4px 4px 0px #ccc; 
            margin: 0; 
            line-height: 1;
        }
        
        /* Date Picker Styling */
        #date-picker { 
            padding: 15px; 
            font-weight: bold; 
            text-align: center; 
            font-size: 1.5em; 
            border: 2px solid #333; 
            /* Pozadí bude barevné podle dne (nastaveno v JS) */
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 3px 3px 0px #333;
        }
        .arrow { cursor: pointer; user-select: none; font-size: 1.5em; padding: 0 10px; color: black; -webkit-text-stroke: 0px;}
        .arrow:hover { transform: scale(1.2); }
        
        /* Celý text datumu je solid černý v barevném kontejneru */
        #current-date-text {
            font-family: 'Arial Black', sans-serif;
            text-transform: uppercase;
            color: black;
            -webkit-text-stroke: 0px; /* Žádný obrys */
        }
        
        .box { border: 2px solid black; padding: 10px; background: white; flex-grow: 1; box-shadow: 4px 4px 0px rgba(0,0,0,0.1); overflow-y: auto;}
        .box h3 { margin-top: 0; font-family: 'Bangers', cursive; font-size: 1.5em; background: #eee; display: inline-block; padding: 5px 10px; border: 1px solid black; text-transform: uppercase;}
        #history-list { list-style-type: none; padding: 0; margin-top: 10px; }
        #history-list li { margin-bottom: 8px; font-size: 1.1em; border-bottom: 1px dashed #ccc; padding-bottom: 4px; font-family: 'Trebuchet MS', sans-serif;}
        
        /* Obarvené dny s černým obrysem (bílý vnitřek) pro historii */
        .history-day {
            font-weight: bold;
            font-family: 'Arial Black', sans-serif;
            text-transform: uppercase;
            color: white; /* Bílý vnitřek */
            -webkit-text-stroke: 1px black; /* Černý obrys */
        }

        #wheel-container { position: relative; margin-top: 30px; } 
        canvas { border-radius: 50%; border: 6px solid #222; cursor: pointer; background: white; box-shadow: 0 15px 25px rgba(0,0,0,0.3); }
        .pointer { 
            position: absolute; 
            right: -25px; 
            top: 50%; 
            transform: translateY(-50%); 
            width: 0; height: 0; 
            border-top: 25px solid transparent; 
            border-bottom: 25px solid transparent; 
            border-right: 50px solid #2da944; 
            filter: drop-shadow(-3px 3px 2px rgba(0,0,0,0.5));
            z-index: 10;
        }
        
        /* Střed s textem a bleskem pod sebou */
        .center-troll { 
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            width: 95px; height: 95px; 
            background: white; 
            border-radius: 50%; 
            border: 5px solid black; 
            display: flex; 
            flex-direction: column; /* Seřadí prvky pod sebe */
            justify-content: center; 
            align-items: center; 
            font-family: 'Bangers', cursive; font-size: 26px; cursor: pointer;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
            color: #d82b2b;
            line-height: 1; /* Zmenší mezeru mezi textem a ikonou */
        }
        
        .center-troll-icon {
            font-size: 32px;
            color: #FFD700;
            -webkit-text-stroke: 1.5px black;
            margin-top: 4px; /* Mezera nad bleskem */
        }
        
        .btn { 
            border-radius: 50%; 
            color: white; 
            border: 3px solid #222; 
            width: 110px; height: 110px; 
            font-family: 'Bangers', cursive;
            font-size: 1.6em; 
            letter-spacing: 1px;
            cursor: pointer; 
            margin: 0 auto; 
            display: block; 
            box-shadow: 3px 5px 0px #222;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0px 2px 0px #222; }
        .btn-reset { background-color: #e62e2e; text-shadow: 1px 1px 0px black; }
        .btn-reverse { background-color: #ff9800; text-shadow: 1px 1px 0px black; } 
        .btn-namelist { background-color: #2da944; text-shadow: 1px 1px 0px black; }
        
        .last-winner { border: 3px solid black; padding: 10px; font-family: 'Bangers', cursive; font-size: 2em; background: white; color: #333;}
        
        #name-input-area { width: 100%; height: 150px; font-size: 1em; padding: 5px; box-sizing: border-box; font-family: Arial;}
        .save-btn { padding: 10px; font-size: 1em; background: #2196f3; color: white; border: 2px solid #222; cursor: pointer; margin-top: 10px; width: 100%; font-weight: bold; font-family: 'Bangers', cursive; font-size: 1.2em;}
        
        #sync-status { position: absolute; top: 5px; right: 10px; font-size: 0.8em; font-weight: bold; color: gray; }
    </style>
</head>
<body>
    <div id="sync-status">🔄 Landogy database Connecting...</div>

    <div class="left-col">
        <h2 style="font-size: 2.2em; text-align: left; text-transform: uppercase;">YOU ARE SPINNING FOR DAY:</h2>
        <div id="date-picker">
            <span class="arrow" onclick="changeDate(-1)">&#8678;</span>
            <span id="current-date-text">FRIDAY 17.4.</span>
            <span class="arrow" onclick="changeDate(1)">&#8680;</span>
        </div>
        
        <div class="box">
            <h3>Already presented</h3>
            <ul id="history-list"></ul>
        </div>
    </div>

    <div class="center-col">
        <h2 style="font-size: 3.5em; color: #2da944;">ITSM DAILY SCRUM WHEEL</h2>
        <div id="wheel-container">
            <canvas id="wheel" width="550" height="550" onclick="spinWheel()"></canvas>
            <div class="center-troll" onclick="spinWheel()">
                SPIN
                <i class="fas fa-bolt center-troll-icon"></i>
            </div>
            <div class="pointer"></div>
        </div>
    </div>

    <div class="right-col">
        <h2 style="font-size: 2.5em; color: #2196f3;">SPINNER</h2>
        <div class="last-winner" id="last-winner-text">---</div>
        
        <button class="btn btn-reset" onclick="resetWheel()">RESET</button>
        <button class="btn btn-reverse" onclick="reverseLast()">REVERSE</button>
        <button class="btn btn-namelist" onclick="toggleNameList()">NAME<br>LIST</button>
        
        <div id="edit-names-container" style="display: none; text-align: left; background: white; border: 2px solid black; padding: 10px; margin-top: 10px;">
            <label style="font-weight: bold; font-size: 0.9em; display:block; margin-bottom: 5px;">Edit names:</label>
            <textarea id="name-input-area"></textarea>
            <button class="save-btn" onclick="saveNames()">SAVE</button>
        </div>
    </div>

<script>
    // ==========================================
    // TVÁ FIREBASE KONFIGURACE (STEJNÁ)
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyBBRSt57EsvIkCQ7ZaU8Gvvc82rl3Z8_c4",
      authDomain: "wheel-23f7a.firebaseapp.com",
      databaseURL: "https://wheel-23f7a-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "wheel-23f7a",
      storageBucket: "wheel-23f7a.firebasestorage.app",
      messagingSenderId: "749954647513",
      appId: "1:749954647513:web:653289f12e8cba6a41c5c8"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const dbRef = database.ref('state');

    // ==========================================
    // LOGIKA APLIKACE (RETENTION)
    // ==========================================

    let currentDate = new Date(); 
    const dayColors = { 1: '#ffe600', 2: '#4caf50', 3: '#2196f3', 4: '#9c27b0', 5: '#ffc0cb' };
    const dayNames = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];

    let names = ["Lukáš", "Veronika", "Lucia", "František", "Dominik", "Marina", "Peter K.", "Hendrik", "Ersin", "Jakub K", "Jakub D", "Tereza", "Iveta", "Marek", "Martin", "Ondřej"];
    let historyObj = []; 
    let colors = ['#e62e2e', '#4caf50', '#ffeb3b', '#2196f3', '#ff9800'];
    
    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");
    let currentAngle = 0;
    let isSpinning = false;
    
    const centerX = 275;
    const centerY = 275;
    const radius = 265; 

    dbRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            names = data.names || [];
            historyObj = data.historyObj || [];
        }
        document.getElementById('sync-status').innerText = "✅Online";
        updateHistoryUI();
        drawWheel();
    });

    function saveStateToFirebase() {
        document.getElementById('sync-status').innerText = "🔄 Saving...";
        dbRef.set({
            names: names,
            historyObj: historyObj
        }).then(() => {
            document.getElementById('sync-status').innerText = "✅ Online";
        });
    }

    // --- DATUM UPDATE LOGIC ---
    function updateDateUI() {
        let d = currentDate.getDate();
        let m = currentDate.getMonth() + 1;
        let dColor = dayColors[currentDate.getDay()];
        
        let dateContainer = document.getElementById('date-picker');
        let dateTextEl = document.getElementById('current-date-text');
        
        dateTextEl.innerText = `${dayNames[currentDate.getDay()]} ${d}.${m}.`;
        
        // Změna: Container background se barví podle dne
        dateContainer.style.backgroundColor = dColor;
        // Změna: Celý datumový text je solid černý (color: black; no stroke)
        dateTextEl.style.color = 'black';
        dateTextEl.style['-webkit-text-stroke'] = '0px'; 
    }

    function changeDate(days) {
        currentDate.setDate(currentDate.getDate() + days);
        if (currentDate.getDay() === 0) currentDate.setDate(currentDate.getDate() + (days > 0 ? 1 : -2));
        else if (currentDate.getDay() === 6) currentDate.setDate(currentDate.getDate() + (days > 0 ? 2 : -1));
        updateDateUI();
    }

    if (currentDate.getDay() === 0 || currentDate.getDay() === 6) changeDate(1);
    else updateDateUI();

    function drawWheel() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (names.length === 0) {
            ctx.fillStyle = "#eee";
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillStyle = "black";
            ctx.font = "bold 30px 'Bangers', cursive";
            ctx.textAlign = "center";
            ctx.fillText("VŠICHNI PREZENTOVALI", centerX, centerY - 80);
            return;
        }
        
        let arc = Math.PI / (names.length / 2);
        for (let i = 0; i < names.length; i++) {
            let angle = currentAngle + i * arc;
            ctx.beginPath();
            ctx.fillStyle = colors[i % colors.length];
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, angle, angle + arc, false);
            ctx.fill();
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#111";
            ctx.stroke();
            
            ctx.save();
            ctx.translate(centerX + Math.cos(angle + arc / 2) * 170, centerY + Math.sin(angle + arc / 2) * 170);
            ctx.rotate(angle + arc / 2 + Math.PI);
            
            // FONT "POPPINS": Cool, bezpatkový, moderní, bílý s černým obrysem
            ctx.font = "bold 20px 'Poppins', sans-serif"; 
            ctx.lineWidth = 3;
            ctx.strokeStyle = "black"; // Černý obrys
            ctx.strokeText(names[i], -ctx.measureText(names[i]).width / 2, 0); 
            
            ctx.fillStyle = "white"; // Bílá výplň
            ctx.fillText(names[i], -ctx.measureText(names[i]).width / 2, 0); 
            
            ctx.restore();
        }
    }

    function getCurrentDateString() {
        return `${currentDate.getDate()}.${currentDate.getMonth() + 1}.`;
    }

    function spinWheel() {
        if (isSpinning || names.length === 0) return;

        let targetDateStr = getCurrentDateString();
        let alreadySelected = historyObj.some(item => item.date === targetDateStr);
        
        if (alreadySelected) {
            alert("⚠️ Alert: For this date (" + targetDateStr + ") is presenter already picked. Please choose another date.");
            return;
        }

        isSpinning = true;
        let spinAngle = Math.random() * 10 + 20; 
        let duration = 3500; 
        let start = null;

        function animate(timestamp) {
            if (!start) start = timestamp;
            let progress = timestamp - start;
            let easeOut = 1 - Math.pow(1 - (progress / duration), 3); 
            
            currentAngle += (spinAngle * (1 - easeOut)) * 0.05;
            drawWheel();
            
            if (progress < duration) {
                requestAnimationFrame(animate);
            } else {
                isSpinning = false;
                selectWinner();
            }
        }
        requestAnimationFrame(animate);
    }

    function selectWinner() {
        let normalizedAngle = currentAngle % (2 * Math.PI);
        let arc = (2 * Math.PI) / names.length;
        let pointerAngle = (2 * Math.PI - normalizedAngle) % (2 * Math.PI);
        let winningIndex = Math.floor(pointerAngle / arc);
        
        let winnerName = names[winningIndex];
        let dateStr = getCurrentDateString();
        let dName = dayNames[currentDate.getDay()];
        let dColor = dayColors[currentDate.getDay()];
        
        historyObj.push({ name: winnerName, date: dateStr, dayName: dName, dayColor: dColor });
        names.splice(winningIndex, 1);
        
        saveStateToFirebase(); 
    }

    function updateHistoryUI() {
        let list = document.getElementById('history-list');
        list.innerHTML = "";
        
        historyObj.forEach(item => {
            let li = document.createElement('li');
            // Změna: Dynamicky se přidává barva dne jako výplň písma (color)
            li.innerHTML = `<strong>${item.name}</strong> - <span class="history-day" style="color: ${item.dayColor}; text-shadow: 2px 2px 0px ${item.dayColor};">${item.dayName}</span> <span style="color:gray; font-size: 0.9em;">${item.date}</span>`;
            list.appendChild(li);
        });

        if (historyObj.length > 0) {
            document.getElementById('last-winner-text').innerText = historyObj[historyObj.length - 1].name;
        } else {
            document.getElementById('last-winner-text').innerText = "---";
        }
    }

    function reverseLast() {
        if (isSpinning || historyObj.length === 0) return;
        let lastEntry = historyObj.pop();
        names.push(lastEntry.name);
        saveStateToFirebase(); 
    }

    function toggleNameList() {
        let container = document.getElementById('edit-names-container');
        if (container.style.display === "none") {
            container.style.display = "block";
            document.getElementById('name-input-area').value = names.join("\n");
        } else {
            container.style.display = "none";
        }
    }

    function saveNames() {
        let text = document.getElementById('name-input-area').value;
        names = text.split("\n").map(n => n.trim()).filter(n => n !== "");
        document.getElementById('edit-names-container').style.display = "none";
        saveStateToFirebase(); 
    }

    function resetWheel() {
        if(confirm("Do you really want to restart the picker? Everyone will be taken back to the wheel")) {
            historyObj = [];
            names = ["Lukáš", "Veronika", "Lucia", "František", "Dominik", "Marina", "Peter K.", "Hendrik", "Ersin", "Jakub K", "Jakub D", "Tereza", "Iveta", "Marek", "Martin", "Ondřej"];
            saveStateToFirebase(); 
        }
    }

    drawWheel();
</script>
</body>
</html>
